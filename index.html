<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Desafío 1 - Condiciones JS</title>
	<style>
		body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
		nav{background:#2b6cb0;color:#fff;padding:10px}
		nav a{color:#fff;margin-right:15px;text-decoration:none;font-weight:600}
		main{padding:20px}
	</style>
</head>
<body>
	<nav>
		<a href="index.html">Desafío 1</a>
		<a href="desafio2.html">Desafío 2</a>
		<a href="desafio3.html">Desafío 3</a>
	</nav>

	<main>
		<h1>Desafío 1: Imagen</h1>
		<p>Este es el menú principal. Usa los enlaces para navegar a las otras dos páginas.</p>
		<img id="toggleImage" src="./assets/img/the-metropolitan-museum-of-art-WjECuRrxd_c-unsplash.jpg" alt="Imagen de ejemplo" style="display:block;max-width:100%;cursor:pointer; height:auto; margin-top:20px">
	</main>
	<script>
		const img = document.getElementById('toggleImage');
		img.addEventListener('click', () => {
			if (img.style.border) {
				img.style.border = '';
			} else {
				img.style.border = '2px solid red';
			}
		});
	</script>
</body>
</html>
