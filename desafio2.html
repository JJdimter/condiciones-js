<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío 2 - Condiciones JS</title>
    <style>
        body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
        nav{background:#2b6cb0;color:#fff;padding:10px}
        nav a{color:#fff;margin-right:15px;text-decoration:none;font-weight:600}
        main{padding:20px}
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Desafío 1</a>
        <a href="desafio2.html">Desafío 2</a>
        <a href="desafio3.html">Desafío 3</a>
    </nav>

    <main>
        <h1>Desafío 2: Contador de sticker</h1>
        <p>Escoge un sticker y elige la cantidad debajo de cada uno.</p>
        <div id="stickers" class="sticker-grid">
            <div class="sticker-item">
                <img src="./assets/img/JoeCoolSticker-ProductImage.webp" alt="Sticker 1" style="cursor:pointer;max-width:100px">
                <input type="number" class="sticker-input" value="0" min="0" max="10" aria-label="Cantidad sticker 1">
            </div>
            <div class="sticker-item">
                <img src="./assets/img/PEANUTS-052_The-Joe-Cool-On-A-Doghouse-Vinyl-Sticker-Decal.webp" alt="Sticker 2" style="cursor:pointer;max-width:100px">
                <input type="number" class="sticker-input" value="0" min="0" max="10" aria-label="Cantidad sticker 2">
            </div>
            <div class="sticker-item">
                <img src="./assets/img/FlyingAceSticker-ProductImage.webp" alt="Sticker 3" style="cursor:pointer;max-width:100px">
                <input type="number" class="sticker-input" value="0" min="0" max="10" aria-label="Cantidad sticker 3">
            </div>
        </div>
        <p id="stickerMessage">Llevas 0 stickers</p>
        <script>
            const stickerInputs = document.querySelectorAll('.sticker-input');
            const stickerMessage = document.getElementById('stickerMessage');

            function updateStickerCount() {
                let totalStickers = 0;
                stickerInputs.forEach(input => {
                    totalStickers += parseInt(input.value) || 0;
                });

                if (totalStickers > 10) {
                    stickerMessage.textContent = 'Superaste el límite de stickers';
                } else {
                    stickerMessage.textContent = `Llevas ${totalStickers} sticker${totalStickers !== 1 ? 's' : ''}`;
                }
            }

            stickerInputs.forEach(input => {
                input.addEventListener('input', updateStickerCount);
            });

            updateStickerCount();
        </script>
    </main>
</body>
</html>
